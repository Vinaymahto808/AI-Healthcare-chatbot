services:
  - type: web
    name: mediassist-chatbot
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --worker-class sync --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: PYTHONUNBUFFERED
        value: "true"
    healthCheckPath: /
    disk:
      name: huggingface-cache
      mountPath: /root/.cache
      sizeGB: 2
